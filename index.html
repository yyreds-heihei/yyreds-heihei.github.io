<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全国ライブ会場マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ライブ会場">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
  // 古いService Workerを全て削除してキャッシュをクリア
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
    caches.keys().then(keys => {
      keys.forEach(key => caches.delete(key));
    });
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e8f0; height: 100vh; display: flex; flex-direction: column; }

  header {
    display: flex; flex-direction: column;
    background: #1a1a24; border-bottom: 1px solid #2a2a3a; flex-shrink: 0;
  }
  .header-row1 {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; gap: 12px;
  }
  .header-row2 {
    padding: 0 20px 10px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.05em; color: #c084fc; white-space: nowrap; }
  .stats { display: flex; gap: 14px; align-items: center; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: 800; color: #a78bfa; line-height: 1; }
  .stat-label { font-size: 0.62rem; color: #888; margin-top: 2px; }
  .progress-bar { width: 130px; height: 5px; background: #2a2a3a; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #c084fc); border-radius: 3px; transition: width 0.4s ease; }

  /* header buttons */
  .btn-header {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 7px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; border: 1px solid;
  }
  .btn-records { background: #1e1a2e; border-color: #7c3aed; color: #c084fc; }
  .btn-records:hover { background: #4c1d95; color: #fff; }
  .btn-ranking { background: #1e2a1a; border-color: #4ade80; color: #4ade80; }
  .btn-ranking:hover { background: #1a4a1a; color: #fff; }

  /* Genre achievement bars */
  .genre-bars-section { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 0 20px 10px; }
  .genre-bars-heading {
    font-size: 0.7rem; font-weight: 700; color: #7c3aed; white-space: nowrap;
    letter-spacing: 0.05em; flex-shrink: 0;
  }
  .genre-bars-list { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .genre-bar-item {
    display: flex; align-items: center; gap: 7px; font-size: 0.75rem;
    background: #111120; border: 1px solid #2a2a3a; border-radius: 7px;
    padding: 6px 10px; cursor: default;
  }
  .genre-bar-label { color: #aaa; white-space: nowrap; }
  .genre-bar-track { width: 80px; height: 7px; background: #2a2a3a; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
  .genre-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .genre-bar-count { color: #888; white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; font-size: 0.72rem; }

  /* ---- Ranking Panel ---- */
  .ranking-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 8000;
    display: flex; align-items: stretch; justify-content: flex-start;
  }
  .ranking-overlay.hidden { display: none; }
  .ranking-panel {
    width: 480px; max-width: 100vw; background: #13131e;
    border-right: 1px solid #2a2a3a; display: flex; flex-direction: column;
    animation: slideInLeft 0.2s ease;
  }
  @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  .ranking-panel-header {
    padding: 16px 20px; background: #1a1a24; border-bottom: 1px solid #2a2a3a;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .ranking-panel-title { font-size: 1rem; font-weight: 700; color: #4ade80; }
  .ranking-panel-close { background: none; border: none; color: #666; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; }
  .ranking-panel-close:hover { color: #f87171; }
  .ranking-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .ranking-body::-webkit-scrollbar { width: 5px; }
  .ranking-body::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
  .ranking-empty { text-align: center; color: #444; font-size: 0.85rem; padding: 60px 20px; }

  .ranking-card {
    display: flex; align-items: center; gap: 12px;
    background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px;
    padding: 11px 14px; margin-bottom: 7px; cursor: pointer; transition: border-color 0.15s;
  }
  .ranking-card:hover { border-color: #4c1d95; }
  .ranking-num {
    font-size: 1.1rem; font-weight: 800; min-width: 28px; text-align: center;
    line-height: 1;
  }
  .rank-1 { color: #fbbf24; }
  .rank-2 { color: #94a3b8; }
  .rank-3 { color: #b45309; }
  .rank-other { color: #444; }
  .ranking-info { flex: 1; min-width: 0; }
  .ranking-venue { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ranking-sub { font-size: 0.7rem; color: #555; margin-top: 2px; }
  .ranking-artists { font-size: 0.7rem; color: #a78bfa; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ranking-count {
    text-align: center; flex-shrink: 0;
  }
  .ranking-count-num { font-size: 1.4rem; font-weight: 800; color: #4ade80; line-height: 1; }
  .ranking-count-label { font-size: 0.6rem; color: #555; }

  /* ---- Records Panel ---- */
  .records-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 8000;
    display: flex; align-items: stretch; justify-content: flex-end;
  }
  .records-overlay.hidden { display: none; }
  .records-panel {
    width: 560px; max-width: 100vw; background: #13131e;
    border-left: 1px solid #2a2a3a; display: flex; flex-direction: column;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .records-panel-header {
    padding: 16px 20px; background: #1a1a24; border-bottom: 1px solid #2a2a3a;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .records-panel-title { font-size: 1rem; font-weight: 700; color: #c084fc; }
  .records-panel-close {
    background: none; border: none; color: #666; font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
  }
  .records-panel-close:hover { color: #f87171; }
  .records-toolbar {
    padding: 10px 16px; background: #1a1a24; border-bottom: 1px solid #2a2a3a;
    display: flex; gap: 8px; align-items: center; flex-shrink: 0; flex-wrap: wrap;
  }
  .records-search {
    flex: 1; min-width: 160px; padding: 6px 10px; background: #0f0f18;
    border: 1px solid #2a2a3a; border-radius: 6px; color: #e8e8f0; font-size: 0.82rem; outline: none;
  }
  .records-search:focus { border-color: #7c3aed; }
  .records-sort {
    padding: 6px 10px; background: #0f0f18; border: 1px solid #2a2a3a;
    border-radius: 6px; color: #e8e8f0; font-size: 0.78rem; outline: none; cursor: pointer;
  }
  .records-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .records-body::-webkit-scrollbar { width: 5px; }
  .records-body::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
  .records-empty { text-align: center; color: #444; font-size: 0.85rem; padding: 60px 20px; line-height: 2; }

  /* Card per visit record */
  .record-card {
    display: flex; gap: 12px; background: #1a1a24;
    border: 1px solid #2a2a3a; border-radius: 10px; padding: 12px; margin-bottom: 8px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .record-card:hover { border-color: #4c1d95; }
  .record-card-photo {
    width: 72px; height: 72px; border-radius: 8px; object-fit: cover;
    border: 1px solid #2a2a3a; flex-shrink: 0; cursor: zoom-in;
  }
  .record-card-photo-empty {
    width: 72px; height: 72px; border-radius: 8px; flex-shrink: 0;
    background: #0f0f18; border: 1px dashed #2a2a3a;
    display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
  }
  .record-card-info { flex: 1; min-width: 0; }
  .record-card-date { font-size: 0.78rem; color: #a78bfa; font-weight: 700; margin-bottom: 3px; }
  .record-card-artist { font-size: 0.92rem; font-weight: 600; color: #e8e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-card-artist-empty { color: #444; font-style: italic; font-size: 0.82rem; }
  .record-card-venue { font-size: 0.75rem; color: #666; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-card-tag {
    font-size: 0.6rem; padding: 2px 7px; border-radius: 10px; font-weight: 600;
    align-self: flex-start; margin-top: 2px; flex-shrink: 0;
  }
  .records-month-header {
    font-size: 0.7rem; font-weight: 700; color: #555; letter-spacing: 0.1em;
    padding: 8px 2px 4px; margin-top: 4px;
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  #map { flex: 1; z-index: 0; }

  .sidebar {
    width: 320px; background: #13131e; border-left: 1px solid #2a2a3a;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px 16px; background: #1a1a24; border-bottom: 1px solid #2a2a3a; flex-shrink: 0;
  }
  .search-box {
    width: 100%; padding: 8px 12px; background: #0f0f18; border: 1px solid #2a2a3a;
    border-radius: 8px; color: #e8e8f0; font-size: 0.85rem; outline: none;
  }
  .search-box:focus { border-color: #7c3aed; }
  .filter-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .filter-btn {
    padding: 4px 10px; border-radius: 20px; border: 1px solid #2a2a3a;
    background: #1a1a24; color: #aaa; font-size: 0.72rem; cursor: pointer; transition: all 0.15s;
  }
  .filter-btn.active { background: #4c1d95; border-color: #7c3aed; color: #e8e8f0; }
  .filter-btn:hover { border-color: #7c3aed; }

  .venue-list { overflow-y: auto; flex: 1; padding: 8px; }
  .venue-list::-webkit-scrollbar { width: 5px; }
  .venue-list::-webkit-scrollbar-track { background: transparent; }
  .venue-list::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

  .region-group { margin-bottom: 4px; }
  .region-title {
    padding: 6px 10px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    color: #7c3aed; text-transform: uppercase; cursor: pointer; display: flex;
    align-items: center; justify-content: space-between; user-select: none;
  }
  .region-title:hover { color: #a78bfa; }
  .region-title .chevron { transition: transform 0.2s; font-size: 0.6rem; }
  .region-title.collapsed .chevron { transform: rotate(-90deg); }

  .venue-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: 8px; cursor: pointer; transition: background 0.15s;
    border: 1px solid transparent;
  }
  .venue-item:hover { background: #1e1e2e; }
  .venue-item.active { background: #1e1e2e; border-color: #4c1d95; }
  .venue-item.hidden { display: none; }

  .venue-check {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #3a3a5a;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.2s; cursor: pointer;
  }
  .venue-check.visited { background: #7c3aed; border-color: #7c3aed; }
  .venue-check.visited::after { content: '✓'; color: white; font-size: 0.65rem; font-weight: 700; }

  .venue-info { flex: 1; min-width: 0; }
  .venue-name { font-size: 0.82rem; font-weight: 600; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .venue-sub { font-size: 0.68rem; color: #666; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .venue-tag {
    font-size: 0.6rem; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; font-weight: 600;
  }
  .tag-dome { background: #1e3a5f; color: #60a5fa; }
  .tag-arena { background: #1a3a1a; color: #4ade80; }
  .tag-hall { background: #3a1a2a; color: #f472b6; }
  .tag-zepp { background: #1a2a3a; color: #38bdf8; }
  .tag-civic { background: #2a2a10; color: #facc15; }
  .tag-livehouse { background: #2a1a10; color: #fb923c; }
  .tag-outdoor { background: #0f2a10; color: #86efac; }
  .tag-concert { background: #1a1a3a; color: #818cf8; }

  /* Leaflet customization */
  .custom-marker {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.15s;
  }
  .marker-dome { background: #1e3a5f; border-color: #60a5fa; }
  .marker-arena { background: #1a3a1a; border-color: #4ade80; }
  .marker-hall { background: #3a1a2a; border-color: #f472b6; }
  .marker-zepp { background: #1a2a3a; border-color: #38bdf8; }
  .marker-civic { background: #2a2a1a; border-color: #facc15; }
  .marker-livehouse { background: #2a1a1a; border-color: #fb923c; }
  .marker-outdoor { background: #0f2a1a; border-color: #86efac; }
  .marker-concert { background: #1a1a3a; border-color: #818cf8; }
  .custom-marker.visited { border-color: #a78bfa !important; filter: brightness(1.3); }
  .custom-marker.pulse { animation: pulse 0.4s ease; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

  .leaflet-popup-content-wrapper {
    background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .leaflet-popup-tip { background: #1a1a24; }
  .leaflet-popup-content { color: #e8e8f0; margin: 12px 16px; min-width: 160px; }
  .popup-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
  .popup-detail { font-size: 0.75rem; color: #888; margin-bottom: 10px; }
  .popup-btn {
    width: 100%; padding: 7px; background: #4c1d95; border: none; border-radius: 6px;
    color: white; font-size: 0.8rem; cursor: pointer; transition: background 0.15s;
  }
  .popup-btn:hover { background: #7c3aed; }
  .popup-btn.visited-btn { background: #1a3a2a; color: #4ade80; }
  .popup-btn.visited-btn:hover { background: #2a4a2a; }
  .popup-visits { font-size: 0.72rem; color: #a78bfa; margin-bottom: 8px; line-height: 1.6; }

  /* ---- Visit modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 16px;
    width: 100%; max-width: 480px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 60px rgba(0,0,0,0.9);
  }
  .modal-header {
    padding: 18px 20px 12px; border-bottom: 1px solid #2a2a3a; flex-shrink: 0;
  }
  .modal-title { font-size: 1rem; font-weight: 700; color: #e8e8f0; }
  .modal-sub { font-size: 0.72rem; color: #666; margin-top: 3px; }

  /* Past visits list */
  .modal-body { flex: 1; overflow-y: auto; padding: 12px 20px; }
  .modal-body::-webkit-scrollbar { width: 4px; }
  .modal-body::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

  .visit-records { margin-bottom: 14px; }
  .visit-record {
    display: flex; gap: 10px; align-items: flex-start;
    background: #13131e; border: 1px solid #2a2a3a; border-radius: 10px;
    padding: 10px; margin-bottom: 8px; position: relative;
  }
  .visit-thumb {
    width: 52px; height: 52px; border-radius: 6px; object-fit: cover;
    flex-shrink: 0; background: #0f0f18; cursor: pointer;
    border: 1px solid #2a2a3a;
  }
  .visit-thumb-empty {
    width: 52px; height: 52px; border-radius: 6px; flex-shrink: 0;
    background: #0f0f18; border: 1px dashed #2a2a3a;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; color: #333;
  }
  .visit-info { flex: 1; min-width: 0; }
  .visit-date { font-size: 0.78rem; font-weight: 700; color: #a78bfa; }
  .visit-artist { font-size: 0.82rem; color: #e8e8f0; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .visit-artist-empty { color: #444; font-style: italic; }
  .visit-delete {
    position: absolute; top: 6px; right: 8px;
    background: none; border: none; color: #444; cursor: pointer; font-size: 0.85rem; padding: 2px;
  }
  .visit-delete:hover { color: #f87171; }
  .no-visits { font-size: 0.75rem; color: #444; text-align: center; padding: 8px 0 4px; }

  /* Add new visit form */
  .add-visit-form {
    background: #111120; border: 1px solid #2a2a3a; border-radius: 10px; padding: 14px;
  }
  .add-visit-title { font-size: 0.72rem; font-weight: 700; color: #7c3aed; letter-spacing: 0.08em; margin-bottom: 10px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-input {
    flex: 1; padding: 8px 10px; background: #0f0f18; border: 1px solid #2a2a3a;
    border-radius: 8px; color: #e8e8f0; font-size: 0.85rem; outline: none;
  }
  .form-input:focus { border-color: #7c3aed; }
  .form-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
  .form-input[type="date"] { width: 150px; flex: none; }

  /* Photo upload */
  .photo-upload-area {
    border: 1.5px dashed #2a2a3a; border-radius: 8px; padding: 10px;
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    transition: border-color 0.15s; margin-bottom: 10px;
  }
  .photo-upload-area:hover { border-color: #7c3aed; }
  .photo-upload-area input[type="file"] { display: none; }
  .photo-preview-wrap { position: relative; flex-shrink: 0; }
  .photo-preview {
    width: 56px; height: 56px; border-radius: 6px; object-fit: cover;
    border: 1px solid #3a3a5a; display: none;
  }
  .photo-preview.has-image { display: block; }
  .photo-placeholder {
    width: 56px; height: 56px; border-radius: 6px; background: #0f0f18;
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  }
  .photo-placeholder.hidden { display: none; }
  .photo-clear {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px; border-radius: 50%; background: #f87171;
    border: none; color: white; font-size: 0.55rem; cursor: pointer;
    display: none; align-items: center; justify-content: center; line-height: 1;
  }
  .photo-clear.visible { display: flex; }
  .photo-label { font-size: 0.78rem; color: #888; line-height: 1.5; }
  .photo-label strong { display: block; color: #bbb; font-size: 0.82rem; }

  .modal-footer {
    padding: 12px 20px 16px; border-top: 1px solid #2a2a3a; flex-shrink: 0;
    display: flex; gap: 8px;
  }
  .btn-primary {
    flex: 1; padding: 10px; background: #7c3aed; border: none; border-radius: 8px;
    color: white; font-size: 0.88rem; font-weight: 600; cursor: pointer;
  }
  .btn-primary:hover { background: #9333ea; }
  .btn-secondary {
    padding: 10px 16px; background: #1a1a2a; border: 1px solid #2a2a3a;
    border-radius: 8px; color: #aaa; font-size: 0.85rem; cursor: pointer;
  }
  .btn-secondary:hover { border-color: #7c3aed; color: #e8e8f0; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 10000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  .lightbox.hidden { display: none; }
  .lightbox-img-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
  .lightbox-img-wrap img { max-width: 88vw; max-height: 80vh; border-radius: 8px; object-fit: contain; display: block; }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-size: 1.4rem; width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; user-select: none;

  .lightbox-nav:hover { background: rgba(124,58,237,0.7); }
  .lightbox-nav.prev { left: -54px; }
  .lightbox-nav.next { right: -54px; }

  .lightbox-counter { font-size: 0.78rem; color: #888; letter-spacing: 0.05em; }
  .lightbox-strip { display: flex; gap: 6px; }
  .lightbox-strip-thumb {
    width: 48px; height: 48px; border-radius: 5px; object-fit: cover; cursor: pointer;
    border: 2px solid transparent; opacity: 0.55; transition: all 0.15s;
  }
  .lightbox-strip-thumb.active { border-color: #a78bfa; opacity: 1; }
  .lightbox-strip-thumb:hover { opacity: 0.9; }
  .lightbox-close {
    position: fixed; top: 16px; right: 20px; background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 1rem;
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; cursor: pointer; z-index: 10001;

  .lightbox-close:hover { background: rgba(248,113,113,0.6); }

  /* Multi-photo upload grid inside modal */
  .photo-grid {
    display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; min-height: 20px;
  }
  .photo-slot {
    width: 64px; height: 64px; border-radius: 7px; position: relative; flex-shrink: 0;
  }
  .photo-slot img {

    border: 1px solid #3a3a5a; cursor: zoom-in; display: block;
  }

  .form-memo {
    width: 100%; padding: 8px 10px; background: #0f0f18; border: 1px solid #2a2a3a;
    border-radius: 8px; color: #e8e8f0; font-size: 0.85rem; outline: none;

    font-size: 0.75rem; color: #b0b0c0; margin-top: 5px; line-height: 1.6;

  /* Setlist */
  .setlist-section { margin-top: 8px; }

  .setlist-view { margin-top: 4px; }
  .setlist-song-row {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 0; border-bottom: 1px solid #1a1a2a; font-size: 0.78rem;
  }
  .setlist-song-row:last-child { border-bottom: none; }
  .setlist-num { color: #555; min-width: 22px; font-size: 0.7rem; text-align: right; flex-shrink: 0; }
  .setlist-song-name { color: #d0d0e8; }
  /* edit mode */
  .setlist-edit-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .setlist-edit-num { color: #555; min-width: 22px; font-size: 0.7rem; text-align: right; flex-shrink: 0; }
  .setlist-input {
    flex: 1; padding: 5px 8px; background: #0f0f18; border: 1px solid #2a2a3a;
    border-radius: 6px; color: #e8e8f0; font-size: 0.82rem; outline: none;
  }
  .setlist-input:focus { border-color: #7c3aed; }
  .setlist-remove {
    background: none; border: none; color: #3a3a5a; cursor: pointer; font-size: 0.8rem; padding: 2px 4px; flex-shrink: 0;
  }
  .setlist-remove:hover { color: #f87171; }
  .setlist-add-btn {
    display: flex; align-items: center; gap: 5px; padding: 5px 10px;
    background: #1a1a2e; border: 1px dashed #3a3a5a; border-radius: 6px;

  .setlist-add-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  /* record panel display */
  .record-setlist { margin-top: 8px; }
  .record-setlist-title { font-size: 0.68rem; color: #7c3aed; font-weight: 700; margin-bottom: 4px; }
  .record-setlist-list { columns: 2; gap: 8px; }
  .record-setlist-item { font-size: 0.72rem; color: #b0b0d0; break-inside: avoid; padding: 1px 0; }
  .record-setlist-item span { color: #555; margin-right: 4px; }

  .record-card-memo {
    font-size: 0.78rem; color: #a0a0c0; margin-top: 6px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-all;
    background: #0d0d18; border-left: 2px solid #3a2a5a;
    padding: 6px 8px; border-radius: 0 6px 6px 0;
  }

  /* Photo gallery in records / visit records */
  .photo-gallery { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .photo-gallery-img {
    width: 60px; height: 60px; object-fit: cover; border-radius: 6px;
    border: 1px solid #2a2a3a; cursor: zoom-in; transition: opacity 0.15s;
  }

  /* Records panel larger gallery */
  .record-gallery { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .record-gallery-img {
    width: 80px; height: 80px; object-fit: cover; border-radius: 7px;
    border: 1px solid #2a2a3a; cursor: zoom-in; transition: opacity 0.15s; flex-shrink: 0;
  }
  .record-gallery-img:hover { opacity: 0.8; }

  /* Sidebar visit display */
  .venue-visits { margin-top: 4px; }

    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .venue-visit-thumb {

  /* ===== スマホ対応 ===== */

    .sidebar-handle {

    .sidebar-handle-bar {
      width: 36px; height: 4px; background: #4c1d95; border-radius: 2px;
    }
    .sidebar-handle-label {
      font-size: 0.78rem; color: #a78bfa; font-weight: 600;
    }

    /* サイドバーの中身はopen時のみスクロール */
    .sidebar-header { flex-shrink: 0; }
    .venue-list { overflow-y: auto; }

    /* モーダル */
    .modal-overlay { padding: 0; align-items: flex-end; }

    .lightbox-nav.prev { left: 4px; }
    .lightbox-nav.next { right: 4px; }
  }
  /* ===== ジャンルバー折りたたみ ===== */
  .header-row2-wrap {

    max-height: 100px;

  }
  .header-row2-wrap.collapsed {
    max-height: 0;
    opacity: 0;
  }
  .genre-toggle-btn {
    display: block; width: 100%; height: 18px;
    background: #111120; border: none; border-top: 1px solid #2a2a3a;
    color: #7c3aed; font-size: 0.6rem; cursor: pointer;
    transition: color 0.15s, background 0.15s;
    line-height: 1; letter-spacing: 0.05em;
  }
  .genre-toggle-btn:hover { color: #c084fc; background: #1a1a2e; }

  /* ===== サイドバー検索折りたたみ ===== */
  .sidebar-search-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 8px; cursor: pointer; user-select: none;

  .sidebar-search-toggle:hover { color: #c084fc; background: #1a1a2e; }
  .sidebar-search-arrow { font-size: 0.55rem; transition: transform 0.25s; }
  .sidebar-search-body {
    overflow: hidden; max-height: 200px; opacity: 1;
    transition: max-height 0.3s ease, opacity 0.25s ease;
  }
  .sidebar-search-body.collapsed { max-height: 0; opacity: 0; }

  /* ===== スプラッシュ ===== */
  #splash {
    position: fixed; inset: 0; z-index: 99999;
    background: #0f0f13;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    transition: opacity 0.6s ease;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash.hidden { display: none; }
  .splash-icon {
    font-size: 72px; line-height: 1;
    animation: splashZoom 2s ease forwards;
  }
  @keyframes splashZoom {
    0%   { transform: scale(0.3); opacity: 0; }
    40%  { transform: scale(1.15); opacity: 1; }
    70%  { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }
  .splash-title {
    font-size: 1.3rem; font-weight: 800; color: #c084fc;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: splashFadeIn 0.6s ease 0.8s forwards;
  }
  .splash-sub {
    font-size: 0.8rem; color: #555;
    opacity: 0;
    animation: splashFadeIn 0.6s ease 1.2s forwards;
  }
  @keyframes splashFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .splash-bar-wrap {
    width: 160px; height: 3px; background: #2a2a3a; border-radius: 2px; overflow: hidden;
    opacity: 0;
    animation: splashFadeIn 0.4s ease 1.4s forwards;
  }
  .splash-bar {
    height: 100%; width: 0; background: linear-gradient(90deg, #7c3aed, #c084fc);
    border-radius: 2px;
    animation: splashBarFill 1.2s ease 1.4s forwards;
  }
  @keyframes splashBarFill {
    from { width: 0; }
    to   { width: 100%; }
  }
</style>
</head>

const seen = new Set();
const VENUES_CLEAN = VENUES.filter(v => { if(seen.has(v.id)) return false; seen.add(v.id); return true; });

const TYPE_ICON  = { dome:'🏟️', arena:'🎪', hall:'🎭', zepp:'🎵', civic:'🏛️', livehouse:'🎸', outdoor:'🌿', concert:'🎼' };
const TYPE_COLOR = { dome:'marker-dome', arena:'marker-arena', hall:'marker-hall', zepp:'marker-zepp', civic:'marker-civic', livehouse:'marker-livehouse', outdoor:'marker-outdoor', concert:'marker-concert' };
const TYPE_LABEL = { dome:'ドーム', arena:'アリーナ', hall:'ホール', zepp:'Zepp', civic:'市民会館', livehouse:'ライブハウス', outdoor:'野外', concert:'コンサートホール' };

// =====================================================
//  DATA  visited[id] = [ {uid, date, artist, photo}, ... ]
// =====================================================
let rawVisited = JSON.parse(localStorage.getItem('venue_visited') || '{}');
let visited = {};
// Migrate: old boolean → [], old number-array/photo-field → new photos[] format
for (const [k, v] of Object.entries(rawVisited)) {
  if (Array.isArray(v)) {
    visited[k] = v.map(item => {
      if (typeof item === 'number') return { uid: uid(), date: String(item), artist: '', photos: [] };
      if (typeof item === 'object' && item !== null) {
        // migrate old single photo → photos array
        if ('photo' in item && !('photos' in item)) {
          return { ...item, photos: item.photo ? [item.photo] : [], photo: undefined };
        }
        if (!('photos' in item)) return { ...item, photos: [] };
        return item;
      }
      return null;
    }).filter(Boolean);
  } else if (v === true) {
    visited[k] = [];
  }
}

function uid() { return Math.random().toString(36).slice(2, 10); }
function isVisited(id) { return id in visited; }
function getRecords(id) { return visited[id] || []; }

function visitSummary(id) {
  const recs = getRecords(id);
  if (!recs.length) return '訪問済み';
  const sorted = [...recs].sort((a,b) => (a.date||'') < (b.date||'') ? 1 : -1);
  const first = sorted[0];
  const label = (first.date ? first.date.replace(/-/g, '/') : '') + (first.artist ? ' ' + first.artist : '');
  return recs.length > 1 ? label + ` 他${recs.length - 1}件` : label;
}

function saveVisited() {
  localStorage.setItem('venue_visited', JSON.stringify(visited));
  updateStats();
  if (!document.getElementById('records-overlay').classList.contains('hidden')) renderRecordsPanel();
  if (!document.getElementById('ranking-overlay').classList.contains('hidden')) renderRankingPanel();
}

// genre color map (matches CSS tag colors)
const GENRE_COLOR = {
  dome:'#60a5fa', arena:'#4ade80', hall:'#f472b6', zepp:'#38bdf8',
  civic:'#facc15', livehouse:'#fb923c', outdoor:'#86efac', concert:'#818cf8'
};

function updateStats() {
  const total = VENUES_CLEAN.length;
  const count = Object.keys(visited).length;
  const pct = total ? Math.round(count / total * 100) : 0;
  document.getElementById('visited-count').textContent = count;
  document.getElementById('total-count').textContent = total;
  document.getElementById('pct-count').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  renderGenreBars();
}

function renderGenreBars() {
  const container = document.getElementById('genre-bars');
  if (!container) return;
  container.innerHTML = '';
  const types = ['dome','arena','hall','zepp','civic','livehouse','outdoor','concert'];
  types.forEach(type => {
    const all = VENUES_CLEAN.filter(v => v.type === type);
    if (!all.length) return;
    const done = all.filter(v => isVisited(v.id)).length;
    const pct = Math.round(done / all.length * 100);
    const color = GENRE_COLOR[type] || '#888';
    const label = TYPE_LABEL[type] || type;
    const el = document.createElement('div');
    el.className = 'genre-bar-item';
    el.title = `${label}: ${done}/${all.length} (${pct}%)`;
    el.innerHTML = `
      <span class="genre-bar-label">${TYPE_ICON[type]} ${label}</span>
      <div class="genre-bar-track"><div class="genre-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="genre-bar-count" style="color:${color}">${done}<span style="color:#444">/${all.length}</span></span>
    `;
    container.appendChild(el);
  });
}

// =====================================================
//  IMAGE COMPRESSION
// =====================================================
function compressImage(file, maxPx = 800, quality = 0.75) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  }
  const sorted = [...modalPendingRecords].sort((a,b) => (a.date||'') < (b.date||'') ? 1 : -1);
  sorted.forEach(rec => renderRecordCard(rec, container));
}

function renderRecordCard(rec, container) {
  const photos = rec.photos || [];
  const isEditing = editingRecordUid === rec.uid;

  const div = document.createElement('div');
  div.className = 'visit-record';
  div.style.cssText = 'flex-direction:column;gap:8px;' + (isEditing ? 'border-color:#7c3aed;background:#1a1030;' : '');

  if (isEditing) {
    // ---- EDIT MODE ----
    // temp photos state (copy of rec.photos so we can cancel)
    const tempPhotos = [...photos];

    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.72rem;font-weight:700;color:#a78bfa;letter-spacing:0.06em;margin-bottom:2px';
    header.textContent = '✏️ 記録を編集';
    div.appendChild(header);

    // date + artist row
    const row1 = document.createElement('div');
    row1.className = 'form-row';
    row1.style.marginBottom = '8px';
    const dateInput = document.createElement('input');
    dateInput.type = 'date'; dateInput.className = 'form-input';
    dateInput.value = rec.date || ''; dateInput.style.width = '150px'; dateInput.style.flex = 'none';
    const artistInput = document.createElement('input');
    artistInput.type = 'text'; artistInput.className = 'form-input';

// Handle photo additions to existing records (shared input)
document.getElementById('record-photo-input').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  // edit-mode photo addition via callback
  if (recordPhotoTargetUid && recordPhotoTargetUid.endsWith('_edit') && window._editPhotoPush) {
    const baseUid = recordPhotoTargetUid.replace('_edit', '');
    const rec = modalPendingRecords.find(r => r.uid === baseUid);
    const currentCount = rec ? (rec.photos||[]).length : 0;
    // Note: tempPhotos is managed by renderEditPhotoGrid closure
    const toProcess = files.slice(0, MAX_PHOTOS - currentCount);
    for (const file of toProcess) {
      window._editPhotoPush(await compressImage(file));
    }
    e.target.value = '';
    recordPhotoTargetUid = null;
    window._editPhotoPush = null;
    return;
  }

  // normal (non-edit) record photo addition
  if (!recordPhotoTargetUid) return;
  const rec = modalPendingRecords.find(r => r.uid === recordPhotoTargetUid);
  if (!rec) return;
  if (!rec.photos) rec.photos = [];
  const toProcess = files.slice(0, MAX_PHOTOS - rec.photos.length);
  for (const file of toProcess) rec.photos.push(await compressImage(file));
  e.target.value = '';
  recordPhotoTargetUid = null;
  renderModalRecords();
});

// =====================================================
//  LIGHTBOX (multi-photo with navigation)
// =====================================================
let lbPhotos = [];
let lbIndex = 0;

function openLightbox(photos, startIdx = 0) {
  lbPhotos = Array.isArray(photos) ? photos : [photos];
  lbIndex = startIdx;
  renderLightbox();
  document.getElementById('lightbox').classList.remove('hidden');
}

function renderLightbox() {
  const img = document.getElementById('lightbox-img');
  const counter = document.getElementById('lb-counter');
  const prev = document.getElementById('lb-prev');
  const next = document.getElementById('lb-next');
  const strip = document.getElementById('lb-strip');

  img.src = lbPhotos[lbIndex];
  counter.textContent = lbPhotos.length > 1 ? `${lbIndex + 1} / ${lbPhotos.length}` : '';

  prev.classList.toggle('hidden', lbPhotos.length <= 1 || lbIndex === 0);
  next.classList.toggle('hidden', lbPhotos.length <= 1 || lbIndex === lbPhotos.length - 1);

  strip.innerHTML = '';
  if (lbPhotos.length > 1) {
    lbPhotos.forEach((src, i) => {
      const t = document.createElement('img');
      t.className = 'lightbox-strip-thumb' + (i === lbIndex ? ' active' : '');
      t.src = src;
      t.addEventListener('click', e => { e.stopPropagation(); lbIndex = i; renderLightbox(); });
      strip.appendChild(t);
    });
  }
}

document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbIndex--; renderLightbox(); });
document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbIndex++; renderLightbox(); });
document.getElementById('lightbox-close').addEventListener('click', e => { e.stopPropagation(); document.getElementById('lightbox').classList.add('hidden'); });
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox') || e.target === document.getElementById('lightbox-img'))
    document.getElementById('lightbox').classList.add('hidden');
});
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; renderLightbox(); }
  if (e.key === 'ArrowRight' && lbIndex < lbPhotos.length - 1) { lbIndex++; renderLightbox(); }
  if (e.key === 'Escape') document.getElementById('lightbox').classList.add('hidden');
});

function pulseMarker(id) {
  const mkrEl = document.getElementById('mkr-' + id);
  if (mkrEl) { mkrEl.classList.add('pulse'); setTimeout(() => mkrEl.classList.remove('pulse'), 400); }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =====================================================
//  MAP
// =====================================================
let markers = {};
let activeFilter = 'all';
let activeVenueId = null;

const map = L.map('map', { center: [36.5, 136.5], zoom: 5, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

function makeIcon(venue) {
  const iv = isVisited(venue.id);
  return L.divIcon({
    className: '',
    html: `<div class="custom-marker ${TYPE_COLOR[venue.type]} ${iv ? 'visited' : ''}" id="mkr-${venue.id}">${TYPE_ICON[venue.type]}</div>`,
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
  });
}

function makePopup(venue) {
  const iv = isVisited(venue.id);
  const recs = getRecords(venue.id);
  const recsSorted = [...recs].sort((a,b) => (a.date||'') < (b.date||'') ? 1 : -1);
  let visitsHtml = '';
  if (recsSorted.length) {
    visitsHtml = '<div class="popup-visits">' +
      recsSorted.slice(0,3).map(r => {
        const d = r.date ? r.date.replace(/-/g,'/') : '';
        const a = r.artist ? ` ${escHtml(r.artist)}` : '';
        const photos = r.photos || [];
        const photoCount = photos.length ? ` 📷${photos.length}` : '';
        return `📅 ${d}${a}${photoCount}`;
      }).join('<br>') +
      (recsSorted.length > 3 ? `<br><span style="color:#555">他${recsSorted.length-3}件</span>` : '') +
      '</div>';
  }
  const gmapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(venue.name)}&center=${venue.lat},${venue.lng}`;
  return `
    <div class="popup-name">${TYPE_ICON[venue.type]} ${venue.name}</div>
    <div class="popup-detail">${venue.sub}</div>
    ${visitsHtml}
    ${iv ? `<button class="popup-btn" style="margin-bottom:6px;background:#1e2a3a;color:#60a5fa;width:100%" onclick="openModalFromPopup('${venue.id}')">✏️ 記録を編集</button>` : ''}
    <button class="popup-btn ${iv ? 'visited-btn' : ''}" style="width:100%" onclick="toggleVisitedFromPopup('${venue.id}')">
      ${iv ? '✓ 訪問済み（クリックで解除）' : '＋ 訪問済みにする'}
    </button>
    <a href="${gmapUrl}" target="_blank" rel="noopener" class="popup-btn" style="display:block;text-align:center;margin-top:6px;background:#1a2a1a;color:#34d399;text-decoration:none;width:100%">
      🗺️ Google マップで見る
    </a>`;
}

VENUES_CLEAN.forEach(venue => {
  const marker = L.marker([venue.lat, venue.lng], { icon: makeIcon(venue) })
    .bindPopup(makePopup(venue), { maxWidth: 240 })
    .addTo(map);
  marker.on('click', () => { highlightSidebarItem(venue.id); scrollToVenue(venue.id); });
  markers[venue.id] = marker;
});

window.toggleVisitedFromPopup = function(id) {
  if (isVisited(id)) {
    delete visited[id];
    saveVisited(); refreshMarker(id); renderSidebar();
    markers[id].setPopupContent(makePopup(VENUES_CLEAN.find(v=>v.id===id)));
  } else {
    markers[id].closePopup();
    openVisitModal(id);
  }
};
window.openModalFromPopup = function(id) {
  markers[id].closePopup();
  openVisitModal(id);
};

function refreshMarker(id) {
  const venue = VENUES_CLEAN.find(v => v.id === id);
  if (venue) markers[id].setIcon(makeIcon(venue));
}
function highlightSidebarItem(id) {
  document.querySelectorAll('.venue-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('active');
  activeVenueId = id;
}
function scrollToVenue(id) {
  const el = document.getElementById('item-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// =====================================================
//  SIDEBAR
// =====================================================
const regionOrder = ['北海道・東北','関東','甲信越・北陸','東海','近畿','中国・四国','九州・沖縄'];
const collapsedRegions = new Set(regionOrder); // 最初は全て折りたたみ

function getFilteredVenues() {
  const q = document.getElementById('search').value.toLowerCase();
  return VENUES_CLEAN.filter(v => {
    if (q && !v.name.toLowerCase().includes(q) && !v.sub.toLowerCase().includes(q) && !v.region.toLowerCase().includes(q)) return false;
    if (activeFilter === 'visited') return isVisited(v.id);
    if (activeFilter === 'unvisited') return !isVisited(v.id);
    if (activeFilter !== 'all') return v.type === activeFilter;
    return true;
  });
}

function renderSidebar() {
  const list = document.getElementById('venue-list');
  const filtered = getFilteredVenues();
  const filteredIds = new Set(filtered.map(v => v.id));
  list.innerHTML = '';

  regionOrder.forEach(region => {
    const venues = filtered.filter(v => v.region === region);
    if (!venues.length) return;

    const group = document.createElement('div');
    group.className = 'region-group';

    const isCollapsed = collapsedRegions.has(region);
    const vCount = VENUES_CLEAN.filter(v => v.region === region).length;
    const vVisited = VENUES_CLEAN.filter(v => v.region === region && isVisited(v.id)).length;
    const title = document.createElement('div');
    title.className = 'region-title' + (isCollapsed ? ' collapsed' : '');
    title.innerHTML = `<span>${region} <span style="color:#555;font-weight:400">${vVisited}/${vCount}</span></span><span class="chevron">▼</span>`;
    title.onclick = () => {
      collapsedRegions.has(region) ? collapsedRegions.delete(region) : collapsedRegions.add(region);
      renderSidebar();
    };
    group.appendChild(title);

    if (!isCollapsed) {
      venues.forEach(venue => {
        const iv = isVisited(venue.id);
        const recs = getRecords(venue.id);
        const item = document.createElement('div');
        item.className = 'venue-item' + (activeVenueId === venue.id ? ' active' : '');
        item.id = 'item-' + venue.id;

        // build visit rows HTML
        let visitsHtml = '';
        if (iv && recs.length) {
          const sorted = [...recs].sort((a,b) => (a.date||'') < (b.date||'') ? 1 : -1);
          visitsHtml = '<div class="venue-visits">' + sorted.slice(0,2).map(r => {
            const d = r.date ? r.date.replace(/-/g,'/') : '';
            const a = r.artist ? ' ' + escHtml(r.artist) : '';
            const photos = r.photos || [];
            const firstPhoto = photos[0];
            const thumb = firstPhoto
              ? `<img class="venue-visit-thumb" src="${firstPhoto}" title="クリックで拡大" data-uid="${r.uid}">`
              : '';
            const photoCount = photos.length > 1 ? `<span style="font-size:0.6rem;color:#555"> 📷${photos.length}</span>` : '';
            return `<div class="venue-visit-row">${thumb}<span class="venue-visit-text">📅 ${d}${a}${photoCount}</span></div>`;
          }).join('') +
          (recs.length > 2 ? `<div style="font-size:0.62rem;color:#555;margin-top:1px">他${recs.length-2}件</div>` : '') +
          '</div>';
        } else if (iv) {
          visitsHtml = '<div class="venue-visits"><div class="venue-visit-row"><span class="venue-visit-text" style="color:#666">訪問済み（記録なし）</span></div></div>';
        }

        item.innerHTML = `
          <div class="venue-check ${iv ? 'visited' : ''}" data-id="${venue.id}"></div>
          <div class="venue-info">
            <div class="venue-name">${venue.name}</div>
            <div class="venue-sub">${venue.sub}</div>
            ${visitsHtml}
          </div>
          <span class="venue-tag tag-${venue.type}">${TYPE_LABEL[venue.type]||''}</span>
        `;

        // thumbnail lightbox — open full photos[] array for the record
        item.querySelectorAll('.venue-visit-thumb').forEach(img => {
          img.addEventListener('click', e => {
            e.stopPropagation();
            const recUid = img.dataset.uid;
            const rec = recs.find(r => r.uid === recUid);
            if (rec) openLightbox(rec.photos || [], 0);
          });
        });

        item.querySelector('.venue-check').addEventListener('click', e => {
          e.stopPropagation();
          if (isVisited(venue.id)) {
            if (!confirm(`「${venue.name}」の訪問記録をすべて削除しますか？`)) return;
            delete visited[venue.id];
            saveVisited(); refreshMarker(venue.id); renderSidebar();
            if (markers[venue.id].isPopupOpen()) markers[venue.id].setPopupContent(makePopup(venue));
          } else {
            openVisitModal(venue.id);
          }
        });

        item.addEventListener('click', () => {
          map.setView([venue.lat, venue.lng], 12, { animate: true });
          markers[venue.id].openPopup();
          highlightSidebarItem(venue.id);
        });
        group.appendChild(item);
      });
    }
    list.appendChild(group);
  });

  VENUES_CLEAN.forEach(v => {
    const el = markers[v.id].getElement();
    if (el) el.style.opacity = filteredIds.has(v.id) ? '1' : '0.15';
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderSidebar();
  });
});
document.getElementById('search').addEventListener('input', renderSidebar);

// =====================================================
//  RANKING PANEL
// =====================================================
function openRankingPanel() {
  renderRankingPanel();
  document.getElementById('ranking-overlay').classList.remove('hidden');
}
function closeRankingPanel() {
  document.getElementById('ranking-overlay').classList.add('hidden');
}

document.getElementById('btn-open-ranking').addEventListener('click', openRankingPanel);
document.getElementById('ranking-panel-close').addEventListener('click', closeRankingPanel);
document.getElementById('ranking-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('ranking-overlay')) closeRankingPanel();
});

function renderRankingPanel() {
  const body = document.getElementById('ranking-body');

  // Build ranking: venues that have been visited, sorted by number of records desc
  const ranked = VENUES_CLEAN
    .filter(v => isVisited(v.id))
    .map(v => {
      const recs = getRecords(v.id);
      const sorted = [...recs].sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);
      const artists = [...new Set(recs.map(r => r.artist).filter(Boolean))];
      const latestDate = sorted[0]?.date || '';
      return { venue: v, count: recs.length || 0, artists, latestDate };
    })
    .sort((a, b) => b.count !== a.count ? b.count - a.count : (b.latestDate > a.latestDate ? 1 : -1));

  if (!ranked.length) {
    body.innerHTML = '<div class="ranking-empty">まだ訪問記録がありません。</div>';
    return;
  }

  body.innerHTML = '';

  // Add a small summary header
  const total = ranked.reduce((s, r) => s + (r.count || 1), 0);
  const summary = document.createElement('div');
  summary.style.cssText = 'font-size:0.72rem;color:#555;margin-bottom:12px;padding:0 2px';
  summary.textContent = `${ranked.length}会場 / 合計 ${total}回 訪問`;
  body.appendChild(summary);

  ranked.forEach(({ venue, count, artists, latestDate }, i) => {
    const rank = i + 1;
    const numClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const artistStr = artists.length ? artists.slice(0,3).join('・') + (artists.length > 3 ? ` 他${artists.length-3}組` : '') : '';
    const dateStr = latestDate ? `最終: ${latestDate.replace(/-/g,'/')}` : '';

    const card = document.createElement('div');
    card.className = 'ranking-card';
    card.innerHTML = `
      <div class="ranking-num ${numClass}">${medal}</div>
      <div class="ranking-info">
        <div class="ranking-venue">${TYPE_ICON[venue.type]} ${venue.name}</div>
        <div class="ranking-sub">${venue.sub}　<span class="venue-tag tag-${venue.type}" style="font-size:0.58rem;padding:1px 6px">${TYPE_LABEL[venue.type]||''}</span></div>
        ${artistStr ? `<div class="ranking-artists">🎤 ${escHtml(artistStr)}</div>` : ''}
        ${dateStr ? `<div style="font-size:0.65rem;color:#555;margin-top:2px">📅 ${dateStr}</div>` : ''}
      </div>
      <div class="ranking-count">
        <div class="ranking-count-num">${count || '−'}</div>
        <div class="ranking-count-label">${count ? '回' : '記録なし'}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      closeRankingPanel();
      map.setView([venue.lat, venue.lng], 13, { animate: true });
      setTimeout(() => markers[venue.id].openPopup(), 400);
      highlightSidebarItem(venue.id);
      scrollToVenue(venue.id);
    });
    body.appendChild(card);
  });
}

// =====================================================
//  RECORDS PANEL
// =====================================================
function openRecordsPanel() {
  renderRecordsPanel();
  document.getElementById('records-overlay').classList.remove('hidden');
  document.getElementById('records-search').focus();
}
function closeRecordsPanel() {
  document.getElementById('records-overlay').classList.add('hidden');
}

document.getElementById('btn-open-records').addEventListener('click', openRecordsPanel);
document.getElementById('records-panel-close').addEventListener('click', closeRecordsPanel);
document.getElementById('records-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('records-overlay')) closeRecordsPanel();
});
document.getElementById('records-search').addEventListener('input', renderRecordsPanel);
document.getElementById('records-sort').addEventListener('change', renderRecordsPanel);

function renderRecordsPanel() {
  const body = document.getElementById('records-body');
  const q = document.getElementById('records-search').value.toLowerCase();
  const sort = document.getElementById('records-sort').value;

  // Collect all records with venue info
  let allEntries = [];
  for (const [venueId, recs] of Object.entries(visited)) {
    if (!Array.isArray(recs)) continue;
    const venue = VENUES_CLEAN.find(v => v.id === venueId);
    if (!venue) continue;
    recs.forEach(rec => {
      allEntries.push({ rec, venue });
    });
    // If no records but visited (empty array) → one placeholder entry
    if (recs.length === 0) {
      allEntries.push({ rec: { uid: venueId + '_empty', date: '', artist: '', photos: [] }, venue });
    }
  }

  // Filter
  if (q) {
    allEntries = allEntries.filter(({ rec, venue }) =>
      venue.name.toLowerCase().includes(q) ||
      (rec.artist || '').toLowerCase().includes(q) ||
      (rec.memo || '').toLowerCase().includes(q) ||
      venue.sub.toLowerCase().includes(q)
    );
  }

  if (!allEntries.length) {
    body.innerHTML = visited && Object.keys(visited).length === 0
      ? `<div class="records-empty">まだ訪問記録がありません。<br>会場のチェックボタンから登録しましょう！</div>`
      : `<div class="records-empty">「${q}」に一致する記録がありません。</div>`;
    return;
  }

  // Sort
  if (sort === 'date-desc') {
    allEntries.sort((a, b) => (b.rec.date || '0000') > (a.rec.date || '0000') ? 1 : -1);
  } else if (sort === 'date-asc') {
    allEntries.sort((a, b) => (a.rec.date || '9999') > (b.rec.date || '9999') ? 1 : -1);
  } else if (sort === 'venue') {
    allEntries.sort((a, b) => a.venue.name.localeCompare(b.venue.name, 'ja'));
  }

  body.innerHTML = '';
  let lastMonth = null;

  allEntries.forEach(({ rec, venue }) => {
    // Month separator (date-sorted modes only)
    if (sort !== 'venue' && rec.date) {
      const month = rec.date.slice(0, 7); // YYYY-MM
      if (month !== lastMonth) {
        const sep = document.createElement('div');
        sep.className = 'records-month-header';
        sep.textContent = month.replace('-', '年') + '月';
        body.appendChild(sep);
        lastMonth = month;
      }
    }

    const photos = rec.photos || [];
    const card = document.createElement('div');
    card.className = 'record-card';
    card.style.flexDirection = 'column';

    const dateLabel = rec.date ? rec.date.replace(/-/g,'/') : '日付未設定';
    const artistHtml = rec.artist
      ? `<div class="record-card-artist">${escHtml(rec.artist)}</div>`
      : `<div class="record-card-artist record-card-artist-empty">アーティスト未入力</div>`;
    const memoHtml = rec.memo
      ? `<div class="record-card-memo">💭 ${escHtml(rec.memo)}</div>`
      : '';

    card.innerHTML = `
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div class="record-card-date">📅 ${dateLabel}</div>
          ${artistHtml}
          <div class="record-card-venue">${TYPE_ICON[venue.type]} ${venue.name}　<span style="color:#555">${venue.sub}</span></div>
          ${memoHtml}
        </div>
        <span class="record-card-tag tag-${venue.type}" style="flex-shrink:0">${TYPE_LABEL[venue.type]||''}</span>
      </div>
      ${photos.length ? `<div class="record-gallery" id="gallery-${rec.uid}"></div>` : '<div style="font-size:0.7rem;color:#333;margin-top:6px">📷 写真なし</div>'}
    `;

    // Build photo gallery
    if (photos.length) {
      const gallery = card.querySelector(`#gallery-${rec.uid}`);
      photos.forEach((src, idx) => {
        const img = document.createElement('img');
        img.className = 'record-gallery-img';
        img.src = src;
        img.title = `${idx+1}/${photos.length}枚目`;
        img.addEventListener('click', e => { e.stopPropagation(); openLightbox(photos, idx); });
        gallery.appendChild(img);
      });
    }

    // Card click → jump to venue on map
    card.addEventListener('click', () => {
      closeRecordsPanel();
      map.setView([venue.lat, venue.lng], 13, { animate: true });
      setTimeout(() => markers[venue.id].openPopup(), 400);
      highlightSidebarItem(venue.id);
      scrollToVenue(venue.id);
    });

    body.appendChild(card);
  });

  // Total count
  const countEl = document.createElement('div');
  countEl.style.cssText = 'text-align:center;font-size:0.7rem;color:#444;padding:12px 0;';
  countEl.textContent = `${allEntries.length}件の記録`;
  body.appendChild(countEl);
}

updateStats();
renderSidebar();

// ジャンル達成バー 折りたたみ
(function() {
  const btn = document.getElementById('genre-toggle-btn');
  const wrap = document.getElementById('genre-bars-wrap');
  if (!btn || !wrap) return;
  btn.addEventListener('click', () => {
    const collapsed = wrap.classList.toggle('collapsed');
    btn.textContent = collapsed ? '▼' : '▲';
  });
})();

// サイドバー 検索・フィルター 折りたたみ
(function() {
  const toggle = document.getElementById('sidebar-search-toggle');
  const body = document.getElementById('sidebar-search-body');
  const arrow = document.getElementById('sidebar-search-arrow');
  if (!toggle || !body) return;
  toggle.addEventListener('click', () => {
    const isNowCollapsed = body.classList.toggle('collapsed');
    arrow.style.transform = isNowCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
  });

(function() {
  const splash = document.getElementById('splash');
  if (!splash) return;
  setTimeout(() => {
    splash.classList.add('fade-out');
    setTimeout(() => splash.classList.add('hidden'), 650);
  }, 2800);
})();

const sidebar = document.getElementById('sidebar');
if (sidebarHandle) {

    sidebar.classList.toggle('sp-open');
  });

</script>
